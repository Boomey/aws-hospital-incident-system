<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hospital Equipment Incident Report</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f8fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 300px;
    }
    h2 {
      text-align: center;
      color: #2a9d8f;
    }
    label {
      font-weight: bold;
      color: #264653;
    }
    input, textarea, button {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #2a9d8f;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #21867a;
    }
  </style>
</head>
<body>
  <form action="#" method="post" enctype="multipart/form-data">
    <h2>Report an Equipment Issue</h2>

    <label for="equipment">Equipment Name:</label>
    <input type="text" id="equipment" name="equipment" required>

    <label for="location">Location:</label>
    <input type="text" id="location" name="location" required>

    <label for="description">Issue Description:</label>
    <textarea id="description" name="description" required></textarea>

    <label for="file">Upload Photo (optional):</label>
    <input type="file" id="file" name="file">

    <button type="submit">Submit Report</button>
  </form>
</body>
</html>
<script>
async function sendDataToBackend(fileContent) {
    try {
        const response = await fetch("https://q9igddbije.execute-api.eu-north-1.amazonaws.com/dev/upload", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                content: fileContent
            })
        });

        const result = await response.json();
        console.log("Backend Response:", result);
    } catch (error) {
        console.error("Error sending data:", error);
    }
}
</script>
